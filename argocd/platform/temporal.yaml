apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: temporal
  namespace: argocd
  annotations:
    # deploy AFTER the LGTM stack (wave 0) + apps so a cold bootstrap staggers the
    # (large) image pulls instead of saturating the single node all at once
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://go.temporal.io/helm-charts
    chart: temporal
    targetRevision: 1.6.0
    helm:
      # bundled single-instance PostgreSQL dev datastore (see manifests/temporal-db);
      # elasticsearch/prometheus/grafana subcharts are gone in this chart line.
      valuesObject:
        server:
          replicaCount: 1
          config:
            logLevel: info
            namespaces:
              create: true
              namespace:
                - name: default
                  retention: 1d
            persistence:
              defaultStore: default
              visibilityStore: visibility
              numHistoryShards: 4   # local dev: 512 (prod default) runs 512 shard
                                    # controllers and saturates a single-node cluster
              datastores:
                default:
                  sql:
                    pluginName: postgres12
                    connectAddr: temporal-postgres:5432
                    connectProtocol: tcp
                    user: temporal
                    password: temporal   # dev-only, matches manifests/temporal-db
                    databaseName: temporal
                    maxConns: 20
                    maxConnLifetime: 1h
                visibility:
                  sql:
                    pluginName: postgres12
                    connectAddr: temporal-postgres:5432
                    connectProtocol: tcp
                    user: temporal
                    password: temporal
                    databaseName: temporal_visibility
                    maxConns: 20
                    maxConnLifetime: 1h
          frontend:
            resources:
              requests: { cpu: 25m, memory: 128Mi }
              limits: { memory: 256Mi }
          history:
            resources:
              requests: { cpu: 25m, memory: 192Mi }
              limits: { memory: 384Mi }
          matching:
            resources:
              requests: { cpu: 25m, memory: 96Mi }
              limits: { memory: 192Mi }
          worker:
            resources:
              requests: { cpu: 25m, memory: 96Mi }
              limits: { memory: 192Mi }
        admintools:
          resources:
            requests: { cpu: 10m, memory: 64Mi }
            limits: { memory: 128Mi }
        web:
          enabled: true
          resources:
            requests: { cpu: 10m, memory: 64Mi }
            limits: { memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: temporal
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
