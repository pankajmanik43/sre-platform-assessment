apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: apps
  labels:
    app.kubernetes.io/name: orders-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: orders-api
          image: orders-api:0.1.0
          imagePullPolicy: IfNotPresent   # image is k3d-imported, not in a registry
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: OTEL_SERVICE_NAME
              value: orders-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://tempo.monitoring.svc.cluster.local:4317
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              # no CPU limit on purpose — requests handle scheduling, a limit only adds throttling
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
