apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporal-healthcheck
  namespace: temporal
  labels:
    app.kubernetes.io/name: temporal-healthcheck
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: temporal-healthcheck
  policyTypes:
    - Egress
  egress:
    # cross-namespace probe to orders-api /healthz (the temporal frontend is reached
    # via the namespace-wide allow-intra-namespace policy; DNS via allow-dns)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: apps
          podSelector:
            matchLabels:
              app.kubernetes.io/name: orders-api
      ports:
        - protocol: TCP
          port: 8000
