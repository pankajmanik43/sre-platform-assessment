apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-healthcheck
  namespace: temporal
  labels:
    app.kubernetes.io/name: temporal-healthcheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-healthcheck
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-healthcheck
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: temporal-healthcheck:0.1.0
          imagePullPolicy: IfNotPresent   # k3d-imported, not in a registry
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TARGET_URL
              value: http://orders-api.apps.svc.cluster.local/healthz
            - name: INTERVAL_SECONDS
              value: "60"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
