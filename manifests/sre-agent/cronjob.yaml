apiVersion: batch/v1
kind: CronJob
metadata:
  name: sre-agent
  namespace: sre-agent
  labels:
    app.kubernetes.io/name: sre-agent
spec:
  # suspended + a never-matching schedule: this is a template, triggered on demand
  # via `kubectl create job --from=cronjob/sre-agent ...` (see scripts/demo-failure.sh)
  suspend: true
  schedule: "0 0 31 2 *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sre-agent
        spec:
          serviceAccountName: sre-agent
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: sre-agent
              image: sre-agent:0.1.0
              imagePullPolicy: IfNotPresent   # k3d-imported, not in a registry
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: sre-agent-anthropic
                      key: api-key
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  # no CPU limit — short-lived job, requests handle scheduling
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}
