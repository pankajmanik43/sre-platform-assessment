apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-api-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"   # picked up by the kps grafana dashboard sidecar (searchNamespace=ALL)
data:
  orders-api.json: |
    {
      "uid": "orders-api",
      "title": "orders-api",
      "schemaVersion": 39,
      "editable": true,
      "tags": [
        "orders-api",
        "slo"
      ],
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "annotations": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request rate",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (status) (rate(http_requests_total{job=\"orders-api\", path=\"/api/orders\"}[$__rate_interval]))",
              "legendFormat": "{{status}}",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error ratio (5xx %)",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "orders_api:error_ratio:rate5m * 100",
              "legendFormat": "5xx %",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "showPoints": "never",
                "lineWidth": 2,
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 7.2
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.50, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"orders-api\", path=\"/api/orders\"}[$__rate_interval])))",
              "legendFormat": "p50",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "B",
              "expr": "histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"orders-api\", path=\"/api/orders\"}[$__rate_interval])))",
              "legendFormat": "p95",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            },
            {
              "refId": "C",
              "expr": "histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job=\"orders-api\", path=\"/api/orders\"}[$__rate_interval])))",
              "legendFormat": "p99",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "fillOpacity": 12,
                "showPoints": "never",
                "lineWidth": 2
              }
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Availability (30d)",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "orders_api:availability:ratio30d * 100",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 99
                  },
                  {
                    "color": "green",
                    "value": 99.5
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          }
        },
        {
          "id": 5,
          "type": "gauge",
          "title": "Error budget remaining (30d)",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 8,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "orders_api:error_budget_remaining:ratio30d * 100",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "decimals": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 25
                  },
                  {
                    "color": "green",
                    "value": 50
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              },
              "min": -100,
              "max": 100
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Requests/s (5m)",
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "orders_api:requests:rate5m",
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "decimals": 2,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "color": {
                "mode": "thresholds"
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "colorMode": "value",
            "graphMode": "area",
            "textMode": "auto"
          }
        },
        {
          "id": 7,
          "type": "logs",
          "title": "orders-api logs (expand a line for the trace link)",
          "gridPos": {
            "h": 12,
            "w": 24,
            "x": 0,
            "y": 14
          },
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "{service_name=\"orders-api\"}",
              "queryType": "range",
              "datasource": {
                "type": "loki",
                "uid": "loki"
              }
            }
          ],
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          }
        }
      ]
    }
