apiVersion: v1
kind: Secret
metadata:
  name: temporal-postgres
  namespace: temporal
type: Opaque
stringData:
  # dev-only credentials; the temporal chart values carry the same password.
  # POSTGRES_DB=postgres so the entrypoint does NOT auto-create a `temporal` db —
  # the temporal schema jobs create `temporal` and `temporal_visibility` themselves.
  POSTGRES_USER: temporal
  POSTGRES_PASSWORD: temporal
  POSTGRES_DB: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-postgres
  namespace: temporal
  labels:
    app.kubernetes.io/name: temporal-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: temporal-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: temporal-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16.4-alpine
          envFrom:
            - secretRef:
                name: temporal-postgres
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata   # subdir so emptyDir root doesn't block initdb
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal", "-d", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal", "-d", "postgres"]
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}   # dev config: state is disposable
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgres
  namespace: temporal
  labels:
    app.kubernetes.io/name: temporal-postgres
spec:
  selector:
    app.kubernetes.io/name: temporal-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
