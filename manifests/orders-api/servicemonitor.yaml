apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: orders-api
  namespace: apps
  labels:
    app.kubernetes.io/name: orders-api
    release: kube-prometheus-stack   # matched by the kps Prometheus serviceMonitorSelector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-api
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
