apiVersion: v1
kind: ServiceAccount
metadata:
  name: sre-agent
  namespace: sre-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sre-agent-read
rules:
  - apiGroups: [""]
    resources: ["pods", "events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sre-agent-read
  namespace: apps   # scope the read-only access to the apps namespace only
subjects:
  - kind: ServiceAccount
    name: sre-agent
    namespace: sre-agent
roleRef:
  kind: ClusterRole
  name: sre-agent-read
  apiGroup: rbac.authorization.k8s.io
