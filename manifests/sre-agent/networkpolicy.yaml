apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sre-agent
  namespace: sre-agent
  labels:
    app.kubernetes.io/name: sre-agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: sre-agent
  policyTypes:
    - Egress
  egress:
    # observability backends: prometheus 9090, alertmanager 9093, loki + tempo 3100
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - { protocol: TCP, port: 9090 }
        - { protocol: TCP, port: 9093 }
        - { protocol: TCP, port: 3100 }
    # api.anthropic.com over HTTPS (443) and the Kubernetes API server (service :443
    # DNATs to the apiserver's real :6443, which the policy sees post-DNAT)
    - ports:
        - { protocol: TCP, port: 443 }
        - { protocol: TCP, port: 6443 }
